<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meowl Notifier</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #2f2f2f;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
    }

    .meme {
      font-size: 60px;
      margin: 20px 0;
    }

    .box {
      background: #3a3a3a;
      margin: 30px auto;
      padding: 20px;
      border-radius: 12px;
      width: 90%;
      max-width: 500px;
    }

    button {
      background: #555;
      border: none;
      padding: 12px 20px;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #777;
    }

    .ltc {
      word-break: break-all;
      margin-top: 10px;
      font-size: 14px;
      color: #ccc;
    }

    footer {
      margin-top: 40px;
      padding: 20px;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <h1>🐱 Meowl Notifier</h1>
    <div class="meme">MEOWL 🗣️</div>
    <p>Simple. Fast. Clean notifier.</p>
  </header>

  <div class="box">
    <h2>Buy Access</h2>
    <p>Price: $5/day</p>
    <p>Send LTC to this address:</p>
    <div class="ltc" id="ltcAddress">LQaLnig2KfEmkNeFSvnH3tq9sJKPKNEHp2</div>
    <br>
    <button onclick="copyLTC()">Copy Address</button>
  </div>

  <footer>
    <p>After payment, contact support with proof.</p>
  </footer>

  <script>
    function copyLTC() {
      const text = document.getElementById('ltcAddress').innerText;
      navigator.clipboard.writeText(text);
      alert('LTC Address Copied!');
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meowl Notifier</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #1f1f1f, #2c2c2c);
  color: white;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

.hero {
  text-align: center;
  margin-bottom: 60px;
}

.hero h1 {
  font-size: 64px;
  font-weight: 800;
}

.hero span {
  color: #aaa;
}

.hero p {
  color: #bbb;
  margin-top: 10px;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  backdrop-filter: blur(10px);
}

.price {
  font-size: 28px;
  margin-bottom: 10px;
}

.ltc {
  background: #111;
  padding: 15px;
  border-radius: 10px;
  font-size: 13px;
  word-break: break-all;
  margin: 15px 0;
}

button {
  background: white;
  color: black;
  border: none;
  padding: 12px 20px;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: scale(1.05);
}

.features {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 20px;
  margin-top: 40px;
}

.feature {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  text-align: center;
}

.footer {
  text-align: center;
  margin-top: 60px;
  color: #888;
}
</style>
</head>
<body>

<div class="container">

  <div class="hero">
    <h1>🐱 MEOWL</h1>
    <p>Notifier that actually hits.</p>
  </div>

  <div class="card">
    <div class="price">$5 / day</div>
    <p>Send LTC to:</p>

    <div class="ltc" id="ltc">
      LQaLnig2KfEmkNeFSvnH3tq9sJKPKNEHp2
    </div>

    <button onclick="copyLTC()">Copy Address</button>
  </div>

  <div class="features">
    <div class="feature">⚡ Fast Logs</div>
    <div class="feature">🎯 Accurate</div>
    <div class="feature">🔥 High Hits</div>
  </div>

  <div class="footer">
    After payment, DM with proof.
  </div>

</div>

<script>
function copyLTC() {
  const text = document.getElementById('ltc').innerText;
  navigator.clipboard.writeText(text);
  alert('Copied!');
}
</script>

</body>
</html>
